<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>

<style>

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial, Helvetica, sans-serif;
flex-direction:column;
color:white;
}

#mensaje{
font-size:60px;
color:#00ffff;
text-align:center;
text-shadow:
0 0 5px #00ffff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff,
0 0 80px #00ffff;
}

button{
padding:12px 25px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<button id="verBtn">Ver mensaje</button>
<div id="mensaje"></div>

<script>

const btn = document.getElementById("verBtn");
const contenedor = document.getElementById("mensaje");

const tiempoBloqueo = 55 * 60 * 60 * 1000; // 55 horas

let ultimaVez = localStorage.getItem("mensaje_tiempo");

function disponible(){

if(!ultimaVez) return true;

let ahora = Date.now();
return (ahora - ultimaVez) > tiempoBloqueo;

}

btn.onclick = function(){

if(!disponible()){
contenedor.innerText = "Ya no se puede ver el mensaje";
btn.style.display = "none";
return;
}

btn.style.display = "none";

const texto = "Alguien como tú";
const palabras = texto.split(" ");

let i = 0;

function mostrar(){

if(i < palabras.length){

contenedor.innerText = palabras[i];
i++;

setTimeout(mostrar,1500);

}else{

localStorage.setItem("mensaje_tiempo", Date.now());

setTimeout(function(){
contenedor.innerText = "Ya no se puede ver el mensaje";
},1500);

}

}

mostrar();

}

</script>

</body>
</html>
